# ==============================
# XOUND - Configuración base
# ==============================

# Servidor
server.port=8082

# PostgreSQL driver
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP - SSL para Supabase
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.data-source-properties.sslmode=require

# Las tablas ya existen en Supabase, no ejecutar schema.sql
spring.sql.init.mode=never

# JPA - solo validar, no modificar tablas existentes
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# JWT
jwt.expiration=86400000

# Para correr localmente, activa el perfil 'local':
#   mvn spring-boot:run -Dspring-boot.run.profiles=local
#   o en IntelliJ: Run Config → Active profiles → local
